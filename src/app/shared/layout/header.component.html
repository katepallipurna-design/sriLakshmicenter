<header class="site-header">
  <div class="header-inner">
  <div class="topbar">
    <a routerLink="/" class="brand tap-target" (click)="menuOpen.set(false)">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 48 48" width="44" height="44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#00b5ad"/>
              <stop offset="100%" stop-color="#2e3192"/>
            </linearGradient>
          </defs>
          <rect x="4" y="4" width="40" height="40" rx="12" fill="url(#g1)" style="filter: drop-shadow(0 6px 12px rgba(46,49,146,0.35));"/>
          <path d="M24 14v20M14 24h20" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="brand-text">
        <span class="brand-title">Srilakshmi</span>
        <span class="brand-sub">Diagnostic Center</span>
      </span>
    </a>

    <div class="right-section">
      <div class="phone">
        <span class="icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </span>
        <a class="number" [href]="'tel:' + brand.phone.replace(/\s/g,'')">{{ brand.phone }}</a>
      </div>

      <button type="button" class="login-btn tap-target">Login / Signup</button>

      <div class="apps" role="group" aria-label="Download app">
        <a class="store-badge store-apple tap-target" href="#" aria-label="App Store">App Store</a>
        <a class="store-badge store-google tap-target" href="#" aria-label="Google Play">Google Play</a>
      </div>
    </div>
  </div>

  <div class="search-row">
    <label class="city-select">
      <span class="visually-hidden">City</span>
      <select>
        <option>{{ brand.city }}</option>
        <option>Bengaluru</option>
        <option>Pune</option>
      </select>
    </label>
    <div class="search-field">
      <span class="search-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input type="search" placeholder="Search for test and health checkup" autocomplete="off" />
    </div>
  </div>

  <nav class="menu" aria-label="Main">
    <div class="menu-bar">
      <button
        type="button"
        class="menu-toggle tap-target"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="main-nav"
        (click)="menuOpen.set(!menuOpen())">
        <span class="burger" [class.open]="menuOpen()"></span>
        <span class="menu-label">{{ menuOpen() ? 'Close' : 'Menu' }}</span>
      </button>

      <ul id="main-nav" [class.open]="menuOpen()">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="menuOpen.set(false)">Home</a></li>
        <li><a routerLink="/about" routerLinkActive="active" (click)="menuOpen.set(false)">About Us</a></li>
        <li class="has-sub">
          <a routerLink="/book-test" routerLinkActive="active" (click)="menuOpen.set(false)">Book a Test</a>
        </li>
        <li><a routerLink="/home-sample-collection" routerLinkActive="active" (click)="menuOpen.set(false)">Home Sample</a></li>
        <li><a routerLink="/buy-health-checkup" routerLinkActive="active" (click)="menuOpen.set(false)">Health Checkup</a></li>
        <li><a routerLink="/upload-prescription" routerLinkActive="active" (click)="menuOpen.set(false)">Upload</a></li>
        <li><a routerLink="/corporate-wellness" routerLinkActive="active" (click)="menuOpen.set(false)">Corporate</a></li>
        <li><a routerLink="/investors" routerLinkActive="active" (click)="menuOpen.set(false)">Investors</a></li>
        <li><a routerLink="/locate-centre" routerLinkActive="active" (click)="menuOpen.set(false)">Centres</a></li>
        <li><a routerLink="/download-report" routerLinkActive="active" (click)="menuOpen.set(false)">Reports</a></li>
      </ul>

      <button type="button" class="cart-btn tap-target" aria-label="Cart, 0 items">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/>
          <path d="M5 6h2l1 12h10l2-9H7"/>
        </svg>
        <span class="cart-badge">0</span>
      </button>
    </div>
  </nav>
  </div>
</header>
